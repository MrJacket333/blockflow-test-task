services:
  postgres:
    image: postgres:16-alpine
    container_name: blockflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blockflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blockflow-network

  redis:
    image: redis:7-alpine
    container_name: blockflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blockflow-network

  backend:
    build: ./backend
    container_name: blockflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./backend/.env.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blockflow-network

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: blockflow-backend-dev
    ports:
      - "3001:3000"
    env_file: ./backend/.env.development
    environment:
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blockflow-network

  frontend:
    build: ./frontend
    container_name: blockflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - blockflow-network

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: blockflow-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - VITE_API_HOST=http://backend:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend-dev
    networks:
      - blockflow-network

volumes:
  postgres_data:
  redis_data:

networks:
  blockflow-network:
    driver: bridge
